<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forever Yours</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <div id="intro-overlay">
        <button id="start-btn">Открыть с Любовью</button>
    </div>

    <div id="main-container">
        <div class="background-image"></div>
        <img id="bouquet" src="assets/bouquet.png" alt="Rose Bouquet">
        <h1 id="greeting"></h1>

        <div id="btn-group">
        <button class="choice-btn" id="btn-yox">Yox</button>
        <button class="choice-btn" id="btn-var">Var</button>
        </div>
    </div>

    <audio id="bg-music" loop>
        <source src="assets/music.mp3" type="audio/mpeg">
    </audio>
   
    <audio id="sound-yox" src="assets/yox.mp3"></audio>
    <audio id="sound-var" src="assets/var.mp3"></audio>
    <script src="js/javascript.js"></script>
</body>
</html>
